<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="중복 없는 로또 번호 6개와 보너스 번호를 빠르게 추첨하고 기록하는 웹 도구"
    />
    <meta name="theme-color" content="#1f8a70" />
    <meta property="og:title" content="Lucky Six - 로또 번호 추첨기" />
    <meta
      property="og:description"
      content="중복 없는 로또 번호 6개와 보너스 번호를 빠르게 추첨하고 기록하는 웹 도구"
    />
    <meta property="og:url" content="https://week1-lotto-site.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Lucky Six - 로또 번호 추첨기" />
    <meta
      name="twitter:description"
      content="중복 없는 로또 번호 6개와 보너스 번호를 빠르게 추첨하고 기록하는 웹 도구"
    />
    <title>Lucky Six - 로또 번호 추첨기</title>
    <link rel="canonical" href="https://week1-lotto-site.vercel.app/" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="tool-panel" aria-labelledby="app-title">
        <div class="title-row">
          <div>
            <p class="eyebrow">Week 1 MVP</p>
            <h1 id="app-title">Lucky Six</h1>
          </div>
          <div class="draw-count" aria-live="polite">
            <span id="draw-count">0</span>
            <small>draws</small>
          </div>
        </div>

        <p class="summary">중복 없는 번호 6개와 보너스 번호를 한 번에 뽑아 기록합니다.</p>

        <div class="machine" aria-hidden="true">
          <span class="ring ring-a"></span>
          <span class="ring ring-b"></span>
          <span class="ring ring-c"></span>
          <span class="spark spark-a"></span>
          <span class="spark spark-b"></span>
        </div>

        <div class="result-card">
          <div class="result-label">
            <span>이번 번호</span>
            <time id="draw-time" datetime="">아직 추첨 전</time>
          </div>

          <ol id="number-list" class="number-list" aria-live="polite">
            <li class="ball empty">?</li>
            <li class="ball empty">?</li>
            <li class="ball empty">?</li>
            <li class="ball empty">?</li>
            <li class="ball empty">?</li>
            <li class="ball empty">?</li>
          </ol>

          <div class="bonus-row">
            <span>Bonus</span>
            <strong id="bonus-ball" class="bonus-ball empty">?</strong>
          </div>
        </div>

        <div class="actions">
          <button id="draw-button" class="primary-button" type="button">추첨하기</button>
          <button id="copy-button" class="secondary-button" type="button" disabled>복사</button>
          <button id="clear-button" class="icon-button" type="button" aria-label="기록 지우기" title="기록 지우기">
            <span aria-hidden="true">×</span>
          </button>
        </div>

        <p id="status-message" class="status-message" role="status">버튼을 누르면 번호가 생성됩니다.</p>
      </section>

      <aside class="history-panel" aria-labelledby="history-title">
        <div class="history-header">
          <h2 id="history-title">최근 기록</h2>
          <span>최대 5개</span>
        </div>
        <ul id="history-list" class="history-list">
          <li class="empty-history">아직 저장된 번호가 없습니다.</li>
        </ul>
        <a class="record-link" href="./README.md">README</a>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
